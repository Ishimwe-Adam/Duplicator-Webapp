openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Duplicator Ltd platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication & sessions
  - name: orders
    description: Customer orders
  - name: invoices
    description: Invoices generated from orders
  - name: payments
    description: Payments recorded against invoices
  - name: analytics
    description: Aggregated metrics for admin dashboards
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Create an account (client self-signup)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "423":
          description: Account locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: End the current session
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders (role-scoped — clients see own, staff see assigned, admins see all)
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order (client self-creates; admin can create on behalf)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order detail with status timeline
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update an order's status (staff/admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusInput"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List invoices (role-scoped — clients see own, admins see all; staff blocked)
      responses:
        "200":
          description: Invoices list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceListResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create an invoice from an existing order (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get invoice detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Aggregated business metrics (admin only)
      responses:
        "200":
          description: Summary metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invoices/{id}/payments:
    post:
      operationId: recordPayment
      tags: [payments]
      summary: Record a manual payment against an invoice (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordPaymentInput"
      responses:
        "201":
          description: Created — returns the updated invoice with payments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
        "400":
          description: Invalid input (e.g. amount > balance, paid/void invoice)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Invoice not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invoices/{id}/status:
    patch:
      operationId: updateInvoiceStatus
      tags: [invoices]
      summary: Update an invoice's status (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvoiceStatusInput"
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Status conflict (raced)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    UserRole:
      type: string
      enum: [super_admin, admin, staff, client]

    AuthUser:
      type: object
      required: [id, email, name, role]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        phone:
          type: ["string", "null"]
        companyName:
          type: ["string", "null"]
        profilePictureUrl:
          type: ["string", "null"]

    AuthResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"

    RegisterInput:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
          minLength: 1
        phone:
          type: string
        companyName:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    OrderStatus:
      type: string
      enum:
        - draft
        - quoted
        - approved
        - in_production
        - ready
        - delivered
        - cancelled

    OrderItemLine:
      type: object
      required: [description, qty, unitPrice]
      properties:
        description:
          type: string
          minLength: 1
          maxLength: 200
        qty:
          type: integer
          minimum: 1
          maximum: 100000
        unitPrice:
          type: integer
          minimum: 0
          maximum: 1000000000
          description: Unit price in RWF (integer)

    OrderPartyRef:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]

    OrderSummary:
      type: object
      required:
        - id
        - orderNumber
        - title
        - status
        - subtotalAmount
        - itemCount
        - createdAt
        - updatedAt
        - client
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        title:
          type: string
        status:
          $ref: "#/components/schemas/OrderStatus"
        subtotalAmount:
          type: integer
        itemCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        client:
          $ref: "#/components/schemas/OrderPartyRef"
        assignedTo:
          oneOf:
            - $ref: "#/components/schemas/OrderPartyRef"
            - type: "null"

    OrderStatusEvent:
      type: object
      required: [id, status, createdAt]
      properties:
        id:
          type: integer
        status:
          $ref: "#/components/schemas/OrderStatus"
        note:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        by:
          oneOf:
            - $ref: "#/components/schemas/OrderPartyRef"
            - type: "null"

    OrderDetail:
      type: object
      required:
        - id
        - orderNumber
        - title
        - status
        - items
        - subtotalAmount
        - notes
        - client
        - createdAt
        - updatedAt
        - timeline
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        title:
          type: string
        status:
          $ref: "#/components/schemas/OrderStatus"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemLine"
        subtotalAmount:
          type: integer
        notes:
          type: ["string", "null"]
        client:
          $ref: "#/components/schemas/OrderPartyRef"
        assignedTo:
          oneOf:
            - $ref: "#/components/schemas/OrderPartyRef"
            - type: "null"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/OrderStatusEvent"

    OrderListResponse:
      type: object
      required: [orders]
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/OrderSummary"

    CreateOrderInput:
      type: object
      required: [title, items]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 160
        items:
          type: array
          minItems: 1
          maxItems: 50
          items:
            $ref: "#/components/schemas/OrderItemLine"
        notes:
          type: string
          maxLength: 2000
        clientId:
          type: integer
          description: Required when an admin creates an order on behalf of a client. Ignored for clients.

    UpdateOrderStatusInput:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/OrderStatus"
        note:
          type: string
          maxLength: 500

    InvoiceStatus:
      type: string
      enum: [draft, sent, paid, void]

    InvoiceOrderRef:
      type: object
      required: [id, orderNumber, title]
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        title:
          type: string

    InvoiceSummary:
      type: object
      required:
        - id
        - invoiceNumber
        - status
        - subtotalAmount
        - taxAmount
        - totalAmount
        - amountPaid
        - balanceDue
        - issueDate
        - dueDate
        - isOverdue
        - client
        - order
        - createdAt
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        status:
          $ref: "#/components/schemas/InvoiceStatus"
        subtotalAmount:
          type: integer
        taxRatePercent:
          type: integer
        taxAmount:
          type: integer
        totalAmount:
          type: integer
        amountPaid:
          type: integer
        balanceDue:
          type: integer
        issueDate:
          type: string
          format: date-time
        dueDate:
          type: string
          format: date-time
        isOverdue:
          type: boolean
        client:
          $ref: "#/components/schemas/OrderPartyRef"
        order:
          $ref: "#/components/schemas/InvoiceOrderRef"
        createdAt:
          type: string
          format: date-time

    InvoiceDetail:
      type: object
      required:
        - id
        - invoiceNumber
        - status
        - items
        - subtotalAmount
        - taxRatePercent
        - taxAmount
        - totalAmount
        - amountPaid
        - balanceDue
        - payments
        - issueDate
        - dueDate
        - isOverdue
        - client
        - order
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        status:
          $ref: "#/components/schemas/InvoiceStatus"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemLine"
        subtotalAmount:
          type: integer
        taxRatePercent:
          type: integer
        taxAmount:
          type: integer
        totalAmount:
          type: integer
        amountPaid:
          type: integer
        balanceDue:
          type: integer
        payments:
          type: array
          items:
            $ref: "#/components/schemas/Payment"
        notes:
          type: ["string", "null"]
        issueDate:
          type: string
          format: date-time
        dueDate:
          type: string
          format: date-time
        sentAt:
          type: ["string", "null"]
          format: date-time
        paidAt:
          type: ["string", "null"]
          format: date-time
        isOverdue:
          type: boolean
        client:
          $ref: "#/components/schemas/OrderPartyRef"
        order:
          $ref: "#/components/schemas/InvoiceOrderRef"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    InvoiceListResponse:
      type: object
      required: [invoices]
      properties:
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceSummary"

    CreateInvoiceInput:
      type: object
      required: [orderId, dueDate]
      properties:
        orderId:
          type: integer
        dueDate:
          type: string
          format: date-time
          description: When payment is due.
        taxRatePercent:
          type: integer
          minimum: 0
          maximum: 100
          description: VAT percent (e.g. 18). Defaults to 0.
        notes:
          type: string
          maxLength: 2000

    UpdateInvoiceStatusInput:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/InvoiceStatus"

    PaymentMethod:
      type: string
      enum: [momo, airtel, bank_transfer, cash, other]

    Payment:
      type: object
      required:
        - id
        - amount
        - method
        - paidAt
        - recordedBy
        - createdAt
      properties:
        id:
          type: integer
        amount:
          type: integer
        method:
          $ref: "#/components/schemas/PaymentMethod"
        reference:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        paidAt:
          type: string
          format: date-time
        recordedBy:
          $ref: "#/components/schemas/OrderPartyRef"
        createdAt:
          type: string
          format: date-time

    AnalyticsMonthlyRevenue:
      type: object
      required: [month, amount]
      properties:
        month:
          type: string
          description: YYYY-MM
        amount:
          type: integer

    AnalyticsOrderStatusCount:
      type: object
      required: [status, count]
      properties:
        status:
          $ref: "#/components/schemas/OrderStatus"
        count:
          type: integer

    AnalyticsTopClient:
      type: object
      required: [id, name, revenue, invoiceCount]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        revenue:
          type: integer
        invoiceCount:
          type: integer

    AnalyticsRecentOrder:
      type: object
      required: [id, orderNumber, title, status, subtotalAmount, clientName, createdAt]
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        title:
          type: string
        status:
          $ref: "#/components/schemas/OrderStatus"
        subtotalAmount:
          type: integer
        clientName:
          type: string
        createdAt:
          type: string
          format: date-time

    AnalyticsSummary:
      type: object
      required: [generatedAt, revenue, receivables, orders, clients, recentOrders]
      properties:
        generatedAt:
          type: string
          format: date-time
        revenue:
          type: object
          required: [thisMonth, lastMonth, last12Months]
          properties:
            thisMonth: { type: integer }
            lastMonth: { type: integer }
            last12Months:
              type: array
              items:
                $ref: "#/components/schemas/AnalyticsMonthlyRevenue"
        receivables:
          type: object
          required: [outstandingAmount, overdueCount]
          properties:
            outstandingAmount: { type: integer }
            overdueCount: { type: integer }
        orders:
          type: object
          required: [active, dueSoon, byStatus]
          properties:
            active: { type: integer }
            dueSoon: { type: integer }
            byStatus:
              type: array
              items:
                $ref: "#/components/schemas/AnalyticsOrderStatusCount"
        clients:
          type: object
          required: [total, newThisMonth, top]
          properties:
            total: { type: integer }
            newThisMonth: { type: integer }
            top:
              type: array
              items:
                $ref: "#/components/schemas/AnalyticsTopClient"
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/AnalyticsRecentOrder"

    RecordPaymentInput:
      type: object
      required: [amount, method]
      properties:
        amount:
          type: integer
          minimum: 1
          description: Amount in FRW. Must be > 0 and ≤ outstanding balance.
        method:
          $ref: "#/components/schemas/PaymentMethod"
        reference:
          type: string
          maxLength: 200
          description: External txn id / slip / cheque number.
        notes:
          type: string
          maxLength: 1000
        paidAt:
          type: string
          format: date-time
          description: When the payment actually happened. Defaults to now.
